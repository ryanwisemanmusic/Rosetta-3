# suite.cfg — per-suite build configuration for basic_snake
# Sourced by tools/test_runner.sh before building this suite.
#
# Available variables (all optional):
#
#   SUITE_CC          Override compiler. Default: clang for .c, clang++ for .cpp.
#   SUITE_CFLAGS      Extra compiler flags appended to the runner defaults.
#   SUITE_LDFLAGS     Extra linker flags (e.g. -lncurses, -lSDL2).
#   SUITE_LINK_ZIG    Link the Rosetta 3 Zig static library. Values:
#                       auto (default) — links if zig-out/lib/librosetta3_zig.a exists
#                       yes            — always link (fail if library is missing)
#                       no             — never link
#   SUITE_INTERACTIVE Mark this suite as requiring a live TTY / keyboard.
#                       yes — the binary is skipped (not run) in --all / --suite
#                             non-interactive mode; only the build is verified.
#                       no  (default) — binary is always executed.

# snake.cpp is a full Win32 console application that requires keyboard input
# and a real terminal. We compile it to verify the headers are usable, but
# we do not attempt to run it in CI / --all mode.
SUITE_INTERACTIVE=yes

# The snake source only needs the Win32 shim headers; no extra libs required.
SUITE_LINK_ZIG=no
