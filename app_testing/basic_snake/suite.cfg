# suite.cfg — per-suite build configuration for basic_snake
# Sourced by tools/test_runner.sh before building this suite.
#
# Available variables (all optional):
#
#   SUITE_CC          Override compiler. Default: clang for .c, clang++ for .cpp.
#   SUITE_CFLAGS      Extra compiler flags appended to the runner defaults.
#   SUITE_LDFLAGS     Extra linker flags (e.g. -lncurses, -lSDL2).
#   SUITE_LINK_ZIG    Link the Rosette Zig static library. Values:
#                       auto (default) — links if zig-out/lib/librosette_zig.a exists
#                       yes            — always link (fail if library is missing)
#                       no             — never link
#   SUITE_INTERACTIVE Mark this suite as requiring a live TTY / keyboard.
#                       yes — the binary is skipped (not run) in --all / --suite
#                             non-interactive mode; only the build is verified.
#                       no  (default) — binary is always executed.
#   SUITE_SOURCES    Space-separated list of source files to build.
#                       Only these files are compiled (and run) by the prodder.
#                       If unset, all .c / .cpp files in the suite directory
#                       are built as separate binaries (original behaviour).

# snake.cpp is compiled directly with -Dmain=rosette_game_main to rename its
# main() so the library's default_main.cpp provides the real main() instead.
SUITE_SOURCES=snake.cpp
SUITE_CFLAGS=-DROSETTE_WINDOW_MODE -Dmain=rosette_game_main

# Links against the ObjC window library:
SUITE_LDFLAGS=librosette_window.a -framework Cocoa -framework Foundation

# This suite is interactive (opens a Cocoa window and blocks until closed).
SUITE_INTERACTIVE=yes

# No Zig library needed — just Win32 shim headers + ObjC window library.
SUITE_LINK_ZIG=no
